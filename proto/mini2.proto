syntax = "proto3";

package mini2;

message TimeRangeQuery {
  int64 start_time = 1;
  int64 end_time = 2;
}

message NumericRangeQuery {
  double min_val = 1;
  double max_val = 2;
}

message IntRangeQuery {
  int32 min_val = 1;
  int32 max_val = 2;
}

message CombinedQuery {
  TimeRangeQuery time_range = 1;
  NumericRangeQuery distance_range = 2;
  IntRangeQuery passenger_range = 3;
}

message QueryRequest {
  string request_id = 1;
  string query_type = 2;
  TimeRangeQuery time_query = 3;
  NumericRangeQuery numeric_query = 4;
  IntRangeQuery int_query = 5;
  CombinedQuery combined_query = 6;
  BftMetadata bft_meta = 7;
}

message TripRecordMsg {
  int32 vendor_id = 1;
  int64 pickup_timestamp = 2;
  int64 dropoff_timestamp = 3;
  int32 passenger_count = 4;
  double trip_distance = 5;
  int32 rate_code_id = 6;
  bool store_and_fwd_flag = 7;
  int32 pu_location_id = 8;
  int32 do_location_id = 9;
  int32 payment_type = 10;
  double fare_amount = 11;
  double extra = 12;
  double mta_tax = 13;
  double tip_amount = 14;
  double tolls_amount = 15;
  double improvement_surcharge = 16;
  double total_amount = 17;
}

message ChunkResponse {
  string request_id = 1;
  int32 chunk_index = 2;
  int32 total_chunks = 3;
  bool is_last = 4;
  repeated TripRecordMsg records = 5;
  double aggregation_sum = 6;
  double aggregation_avg = 7;
  int64 aggregation_count = 8;
  // Records per chunk used when this response was framed (dynamic sizing at entry).
  int32 effective_chunk_size = 9;
  BftMetadata bft_meta = 10;
}

message ChunkRequest {
  string request_id = 1;
  int32 chunk_index = 2;
}

message ForwardRequest {
  string request_id = 1;
  string origin_node = 2;
  QueryRequest query = 3;
  BftMetadata bft_meta = 4;
}

message ForwardResponse {
  string request_id = 1;
  string source_node = 2;
  repeated TripRecordMsg records = 3;
  double aggregation_sum = 4;
  double aggregation_avg = 5;
  int64 aggregation_count = 6;
  BftMetadata bft_meta = 7;
}

message BftMetadata {
  string node_id = 1;
  string payload_hash = 2;
  string auth_tag = 3;
  uint64 nonce = 4;
  int64 timestamp_ms = 5;
  string algorithm = 6;
}

message CancelRequest {
  string request_id = 1;
}

message CancelResponse {
  bool acknowledged = 1;
}

// ---- Management channel (separate from data RPCs) ----

message StatusRequest {
  string requester_id = 1;
}

message StatusResponse {
  string node_id = 1;
  int32  active_requests      = 2;  // SubmitQuery calls in flight
  int32  pending_chunks       = 3;  // entries sitting in chunk cache
  int32  fairness_queue_depth = 4;  // requests in round-robin queue
  double throughput_rps       = 5;  // completions in last 30s / 30
  int64  uptime_seconds       = 6;
}

message HeartbeatRequest {
  string sender_id    = 1;
  int64  timestamp_ms = 2;
}

message HeartbeatResponse {
  string node_id      = 1;
  int64  timestamp_ms = 2;
  bool   alive        = 3;
}

service NodeService {
  rpc SubmitQuery(QueryRequest) returns (ChunkResponse);
  rpc FetchChunk(ChunkRequest) returns (ChunkResponse);
  rpc ForwardQuery(ForwardRequest) returns (ForwardResponse);
  rpc CancelQuery(CancelRequest) returns (CancelResponse);
}

// MgmtService is a separate logical channel for status and heartbeat,
// keeping management traffic out of the data service queue.
service MgmtService {
  rpc GetStatus(StatusRequest) returns (StatusResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
}
